<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard Admin — Peradaban Moyudan</title>
<link rel="stylesheet" href="/assets/theme.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%F0%9F%96%A8%EF%B8%8F%3C/text%3E%3C/svg%3E">
</head>
<body>
<div id="nav"></div>
<main class="wrap section">

  <!-- LOGIN -->
  <div id="login" class="hide">
    <div class="card pad narrow" style="margin:0 auto;max-width:420px">
      <h1 class="h1" style="font-size:24px">Masuk Admin</h1>
      <p class="hint mt8">Masukkan email pemilik. Kami kirim tautan masuk (magic link).</p>
      <div class="field mt16"><input type="email" id="email" placeholder="email@anda.com"></div>
      <button class="btn block" id="send-link">Kirim tautan masuk</button>
      <p class="hint center mt16" id="login-msg"></p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" class="hide">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <div>
        <span class="eyebrow">Panel pemilik</span>
        <h1 class="h1" style="font-size:28px">Antrean cetak</h1>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="badge green" id="live"><span class="dot"></span>Live</span>
        <button class="btn ghost sm" id="logout">Keluar</button>
      </div>
    </div>

    <div class="mt24" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px" id="stats"></div>

    <div class="mt24" style="display:flex;gap:8px;flex-wrap:wrap" id="filters"></div>

    <div class="card mt16">
      <div class="tblwrap">
        <table class="tbl">
          <thead><tr><th>Kode</th><th>Pemohon</th><th>Dokumen</th><th>Detail</th><th>Status</th><th>Waktu</th><th></th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div id="empty" class="pad center hide"><p class="hint">Belum ada permintaan.</p></div>
    </div>
  </div>
</main>
<div id="foot"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script src="/assets/common.js"></script>
<script src="/assets/admin.js"></script>
</body>
</html>
